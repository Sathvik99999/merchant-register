<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sri Laxmi Balaji Jewellers</title>

<style>
body{
margin:0;
font-family:Arial;
background:
linear-gradient(rgba(0,0,0,0.88),rgba(20,10,0,0.92)),
url('https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0');
background-size:cover;
color:white;
padding:20px;
}

h1{
text-align:center;
color:gold;
font-size:48px;
text-shadow:0 0 20px gold;
}

.mainCard{
background:rgba(255,215,0,0.07);
border:1px solid rgba(255,215,0,0.2);
border-radius:20px;
padding:20px;
margin:20px 0;
backdrop-filter:blur(8px);
}

input,select{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:16px;
}

button{
padding:14px 22px;
background:linear-gradient(45deg,#ffd700,#ffb700);
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.panel{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
}

.table{
margin-top:15px;
background:rgba(255,255,255,0.06);
padding:15px;
border-radius:15px;
}

.summary{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.card{
background:rgba(255,215,0,0.08);
padding:20px;
border-radius:16px;
text-align:center;
}

h2,h3{
color:gold;
}
</style>
</head>

<body>

<h1>Sri Laxmi Balaji Jewellers</h1>

<div class="mainCard">
<input id="merchant" placeholder="Enter Merchant Name">
<button onclick="openMerchant()">Open Merchant</button>
</div>

<div id="dashboard" style="display:none;">

<div class="summary">
<div class="card">
<h3>Total Weight</h3>
<p id="tw">0 g</p>
</div>

<div class="card">
<h3>Total Paid</h3>
<p id="tp">₹0</p>
</div>

<div class="card">
<h3>Total Entries</h3>
<p id="te">0</p>
</div>
</div>

<div class="grid">

<div class="panel">
<h2>Items Section</h2>

<input id="itemName" placeholder="Item Name">
<input id="itemWeight" placeholder="Exact Weight">
<button onclick="addItem()">Add Item</button>

<div class="table" id="itemHistory"></div>
</div>

<div class="panel">
<h2>Payments Section</h2>

<input id="amount" placeholder="Enter Amount">

<select id="ptype">
<option>Cash</option>
<option>PhonePe</option>
<option>Bank Transfer</option>
</select>

<button onclick="addPayment()">Add Payment</button>

<div class="table" id="paymentHistory"></div>
</div>

</div>
</div>

<script>
let db=JSON.parse(localStorage.getItem("goldshop"))||{};
let current="";

function save(){
localStorage.setItem("goldshop",JSON.stringify(db));
}

function openMerchant(){
current=document.getElementById("merchant").value;
if(!db[current]) db[current]={items:[],payments:[]};
document.getElementById("dashboard").style.display="block";
render();
save();
}

function addItem(){
db[current].items.push({
name:itemName.value,
weight:Number(itemWeight.value),
date:new Date().toLocaleString()
});
save();
render();
}

function addPayment(){
db[current].payments.push({
amount:Number(amount.value),
type:ptype.value,
date:new Date().toLocaleString()
});
save();
render();
}

function render(){
let items="",payments="";
let tw=0,tp=0;

db[current].items.forEach((x,i)=>{
tw+=x.weight;
items+=`
<div>
${x.date}<br>
${x.name} - ${x.weight} g
<button onclick="deleteItem(${i})">Delete</button>
<hr>
</div>`;
});

db[current].payments.forEach((x,i)=>{
tp+=x.amount;
payments+=`
<div>
${x.date}<br>
₹${x.amount} via ${x.type}
<button onclick="deletePayment(${i})">Delete</button>
<hr>
</div>`;
});

itemHistory.innerHTML=items;
paymentHistory.innerHTML=payments;

tw.innerHTML=tw+" g";
tp.innerHTML="₹"+tp;
te.innerHTML=db[current].items.length+db[current].payments.length;
}

function deleteItem(i){
db[current].items.splice(i,1);
save();
render();
}

function deletePayment(i){
db[current].payments.splice(i,1);
save();
render();
}
</script>

</body>
</html>
