₹<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sri Laxmi Balaji Jewellers</title>

<style>
body{
margin:0;
font-family:Arial;
padding:20px;
background:
linear-gradient(rgba(0,0,0,0.85),rgba(30,15,0,0.9)),
url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce364');
background-size:cover;
background-attachment:fixed;
color:white;
}

h1{
text-align:center;
color:gold;
font-size:55px;
text-shadow:0 0 20px gold;
}

.card{
background:rgba(255,215,0,0.06);
padding:20px;
margin:15px 0;
border-radius:18px;
backdrop-filter:blur(10px);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.summary{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.box{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:16px;
text-align:center;
}

input,select{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:12px 18px;
background:gold;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.history{
margin-top:15px;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:12px;
}

h2{
color:gold;
}
</style>
</head>

<body>

<h1>Sri Laxmi Balaji Jewellers</h1>

<div class="card">
<input id="merchant" placeholder="Merchant Name">
<button onclick="openMerchant()">Open Merchant</button>
</div>

<div id="dashboard" style="display:none;">

<div class="summary">
<div class="box">
<h2>Total Weight</h2>
<p id="totalWeight">0 g</p>
</div>

<div class="box">
<h2>Total Paid</h2>
<p id="totalPaid">₹0</p>
</div>

<div class="box">
<h2>Total Entries</h2>
<p id="totalEntries">0</p>
</div>
</div>

<div class="grid">

<div class="card">
<h2>Items Section</h2>

<input id="itemName" placeholder="Item Name">
<input id="itemWeight" type="number" placeholder="Weight in grams">

<button onclick="addItem()">Add Item</button>

<div id="itemHistory" class="history"></div>
</div>

<div class="card">
<h2>Payments Section</h2>

<input id="paymentAmount" type="number" placeholder="Amount">

<select id="paymentType">
<option>Cash</option>
<option>PhonePe</option>
<option>Bank Transfer</option>
</select>

<button onclick="addPayment()">Add Payment</button>

<div id="paymentHistory" class="history"></div>
</div>

</div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("merchantDB")) || {};
let currentMerchant = "";

function saveDB(){
localStorage.setItem("merchantDB", JSON.stringify(db));
}

function openMerchant(){
currentMerchant = document.getElementById("merchant").value;

if(!db[currentMerchant]){
db[currentMerchant]={items:[],payments:[]};
}

document.getElementById("dashboard").style.display="block";
render();
saveDB();
}

function addItem(){
let item=document.getElementById("itemName").value;
let weight=parseFloat(document.getElementById("itemWeight").value);

if(item && !isNaN(weight)){
db[currentMerchant].items.push({
item:item,
weight:weight,
date:new Date().toLocaleString()
});
saveDB();
render();
}
}

function addPayment(){
let amount=parseFloat(document.getElementById("paymentAmount").value);
let type=document.getElementById("paymentType").value;

if(!isNaN(amount)){
db[currentMerchant].payments.push({
amount:amount,
type:type,
date:new Date().toLocaleString()
});
saveDB();
render();
}
}

function render(){
let itemHTML="";
let paymentHTML="";
let totalWeight=0;
let totalPaid=0;

db[currentMerchant].items.forEach((x,i)=>{
totalWeight+=x.weight;
itemHTML+=`
<div>
${x.date}<br>
${x.item} - ${x.weight} g
<button onclick="deleteItem(${i})">Delete</button>
<hr>
</div>`;
});

db[currentMerchant].payments.forEach((x,i)=>{
totalPaid+=x.amount;
paymentHTML+=`
<div>
${x.date}<br>
₹${x.amount} via ${x.type}
<button onclick="deletePayment(${i})">Delete</button>
<hr>
</div>`;
});

document.getElementById("itemHistory").innerHTML=itemHTML;
document.getElementById("paymentHistory").innerHTML=paymentHTML;

document.getElementById("totalWeight").innerText=totalWeight+" g";
document.getElementById("totalPaid").innerText="₹"+totalPaid;
document.getElementById("totalEntries").innerText=
db[currentMerchant].items.length + db[currentMerchant].payments.length;
}

function deleteItem(i){
db[currentMerchant].items.splice(i,1);
saveDB();
render();
}

function deletePayment(i){
db[currentMerchant].payments.splice(i,1);
saveDB();
render();
}
</script>

</body>
</html>
