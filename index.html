<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sri Laxmi Balaji Jewellers</title>

<style>
body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

h1{
text-align:center;
color:#b8860b;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,select{
padding:10px;
margin:5px;
width:220px;
}

button{
padding:10px 15px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.merchantArea{
display:flex;
gap:20px;
}

.section{
flex:1;
background:#fafafa;
padding:20px;
border-radius:12px;
}

.history{
margin-top:15px;
background:#eee;
padding:15px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Sri Laxmi Balaji Jewellers Merchant Register</h1>

<div class="card">
<h2>Add Merchant</h2>
<input type="text" id="merchantName" placeholder="Merchant Name">
<button onclick="addMerchant()">Add</button>
</div>

<div class="card">
<h2>Search Merchant</h2>
<input type="text" id="searchMerchant" placeholder="Merchant Name">
<button onclick="loadMerchant()">Search</button>
</div>

<div id="merchantSection" style="display:none;" class="card">

<h2 id="merchantTitle"></h2>

<div class="merchantArea">

<!-- ITEMS -->
<div class="section">
<h3>Items Section</h3>

<input id="itemName" placeholder="Item Name">
<input id="itemWeight" type="number" placeholder="Weight">
<button onclick="addItem()">Add Item</button>

<div class="history" id="itemHistory"></div>
</div>

<!-- AMOUNT -->
<div class="section">
<h3>Amount Section</h3>

<input id="amount" type="number" placeholder="Amount">
<select id="paymentType">
<option>Cash</option>
<option>PhonePe</option>
</select>

<button onclick="addPayment()">Add Payment</button>

<div class="history" id="paymentHistory"></div>
</div>

</div>
</div>

</div>

<script>
let merchants = JSON.parse(localStorage.getItem("merchants")) || {};
let currentMerchant = "";

function addMerchant(){
let name=document.getElementById("merchantName").value;
if(name){
merchants[name]={items:[],payments:[]};
save();
alert("Merchant Added");
}
}

function loadMerchant(){
let name=document.getElementById("searchMerchant").value;
if(merchants[name]){
currentMerchant=name;
document.getElementById("merchantSection").style.display="block";
document.getElementById("merchantTitle").innerText=name;
render();
}
}

function addItem(){
let item=document.getElementById("itemName").value;
let weight=document.getElementById("itemWeight").value;

merchants[currentMerchant].items.push({
item,weight,date:new Date().toLocaleString()
});

save();
render();
}

function addPayment(){
let amount=document.getElementById("amount").value;
let type=document.getElementById("paymentType").value;

merchants[currentMerchant].payments.push({
amount,type,date:new Date().toLocaleString()
});

save();
render();
}

function render(){
let itemHTML="";
let payHTML="";

merchants[currentMerchant].items.forEach(i=>{
itemHTML+=`${i.date} - ${i.item} (${i.weight}g)<br>`;
});

merchants[currentMerchant].payments.forEach(p=>{
payHTML+=`${p.date} - ₹${p.amount} (${p.type})<br>`;
});

document.getElementById("itemHistory").innerHTML=itemHTML;
document.getElementById("paymentHistory").innerHTML=payHTML;
}

function save(){
localStorage.setItem("merchants",JSON.stringify(merchants));
}
</script>

</body>
</html>
