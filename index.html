<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sri Laxmi Balaji Jewellers</title>
<style>
body{
font-family:Arial;
margin:0;
padding:20px;
background:linear-gradient(rgba(0,0,0,0.85),rgba(40,20,0,0.9)),
url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338');
background-size:cover;
color:white;
}

h1{text-align:center;color:gold;}

.card{
background:rgba(255,215,0,0.08);
padding:20px;
margin:15px 0;
border-radius:15px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.flex{
display:flex;
gap:20px;
}

.section{
flex:1;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:12px;
}

.history{
margin-top:15px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:8px;
}
</style>
</head>
<body>

<h1>Sri Laxmi Balaji Jewellers</h1>

<div class="card">
<input id="merchant" placeholder="Merchant Name">
<button onclick="openMerchant()">Open Merchant</button>
</div>

<div id="main" style="display:none;" class="flex">

<div class="section">
<h2>Items</h2>
<input id="item" placeholder="Item Name">
<input id="weight" placeholder="Weight">
<button onclick="addItem()">Add Item</button>
<div id="itemHistory" class="history"></div>
</div>

<div class="section">
<h2>Payments</h2>
<input id="amount" placeholder="Amount">
<select id="ptype">
<option>Cash</option>
<option>PhonePe</option>
</select>
<button onclick="addPayment()">Add Payment</button>
<div id="paymentHistory" class="history"></div>
</div>

</div>

<div class="card" id="summary"></div>

<script>
let data=JSON.parse(localStorage.getItem("shop"))||{};
let current="";

function save(){
localStorage.setItem("shop",JSON.stringify(data));
}

function openMerchant(){
current=document.getElementById("merchant").value;
if(!data[current]) data[current]={items:[],payments:[]};
document.getElementById("main").style.display="flex";
render();
save();
}

function addItem(){
data[current].items.push({
item:document.getElementById("item").value,
weight:document.getElementById("weight").value,
date:new Date().toLocaleString()
});
save();
render();
}

function addPayment(){
data[current].payments.push({
amount:document.getElementById("amount").value,
type:document.getElementById("ptype").value,
date:new Date().toLocaleString()
});
save();
render();
}

function render(){
let items="",payments="",tw=0,tp=0;

data[current].items.forEach((x,i)=>{
items+=`${x.date}<br>${x.item} - ${x.weight}g <button onclick="deleteItem(${i})">Delete</button><hr>`;
tw+=Number(x.weight);
});

data[current].payments.forEach((x,i)=>{
payments+=`${x.date}<br>₹${x.amount} via ${x.type} <button onclick="deletePayment(${i})">Delete</button><hr>`;
tp+=Number(x.amount);
});

document.getElementById("itemHistory").innerHTML=items;
document.getElementById("paymentHistory").innerHTML=payments;
document.getElementById("summary").innerHTML=
`<h2>History & Summary</h2>
Total Weight: ${tw} g<br>
Total Paid: ₹${tp}`;
}

function deleteItem(i){
data[current].items.splice(i,1);
save();
render();
}

function deletePayment(i){
data[current].payments.splice(i,1);
save();
render();
}
</script>

</body>
</html>
